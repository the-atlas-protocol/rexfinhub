services:
  - type: web
    name: etp-tracker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && bash scripts/render_build.sh
    startCommand: bash scripts/render_start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: AZURE_TENANT_ID
        sync: false
      - key: AZURE_CLIENT_ID
        sync: false
      - key: AZURE_CLIENT_SECRET
        sync: false
      - key: AZURE_SENDER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      # Auth credentials — sync:false tells Render to preserve the value
      # set in the dashboard rather than syncing from this file. Without
      # the declaration here, each deploy would re-roll the random
      # fallback baked into webapp/main.py, locking the site.
      - key: SITE_PASSWORD
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: API_KEY
        sync: false
      - key: RENDER
        value: "true"
    disk:
      name: etp-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
