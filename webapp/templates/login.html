<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f1923">
  <script>(function(){var t=localStorage.getItem('rex-theme');if(!t){t='light'}document.documentElement.setAttribute('data-theme',t)})()</script>
  <title>Login - REX Financial Intelligence Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/img/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/img/apple-touch-icon.png">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .login-page { display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; background:var(--surface-0); }
    .login-container { max-width:400px; width:100%; padding:20px; }
    .login-header { text-align:center; margin-bottom:32px; }
    .login-brand { font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--teal); margin-bottom:8px; }
    .login-title { font-size:26px; font-weight:700; margin:0; color:var(--gray-900); line-height:1.2; }
    .login-subtitle { color:var(--text-secondary); font-size:14px; margin:10px 0 0; line-height:1.5; }
    .login-card { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:32px; box-shadow:0 4px 24px rgba(0,0,0,0.06); }
    .login-label { display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:var(--gray-700); }
    .login-input { width:100%; padding:11px 14px; border:1px solid var(--border); border-radius:8px; font-size:14px; box-sizing:border-box; background:var(--surface-0); color:var(--text-primary); transition:border-color 0.15s; }
    .login-input:focus { outline:none; border-color:var(--teal); box-shadow:0 0 0 3px rgba(13,148,136,0.1); }
    .login-btn { width:100%; padding:12px; font-size:15px; font-weight:600; border:none; border-radius:8px; background:var(--teal); color:#fff; cursor:pointer; transition:background 0.15s; }
    .login-btn:hover { background:#0B7C72; }
    .login-footer { text-align:center; color:var(--text-muted); font-size:11px; margin-top:24px; }
    .login-divider { display:flex; align-items:center; gap:12px; margin:20px 0; color:var(--text-muted); font-size:12px; }
    .login-divider::before, .login-divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .login-sources { display:flex; justify-content:center; gap:24px; margin-top:6px; font-size:11px; color:var(--text-muted); }
  </style>
</head>
<body class="login-page">

<div class="login-container">
  <div class="login-header">
    <div class="login-brand">REX Financial</div>
    <h1 class="login-title">Intelligence Hub</h1>
    <p class="login-subtitle">Market intelligence, SEC filings, and product analytics for leveraged ETPs.</p>
  </div>

  <div class="login-card">
    {% if error %}
    <div style="background:var(--red-bg); border-left:4px solid var(--red); padding:10px 14px; border-radius:0 6px 6px 0; margin-bottom:16px; font-size:13px;">
      <strong style="color:var(--red);">{{ error }}</strong>
    </div>
    {% endif %}

    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next_url }}">
      <div style="margin-bottom:20px;">
        <label class="login-label">Password</label>
        <input type="password" name="password" required autofocus
               placeholder="Enter password"
               class="login-input">
      </div>
      <button type="submit" class="login-btn">Sign In</button>
    </form>
  </div>

  <div class="login-footer">
    <div class="login-divider">Data Sources</div>
    <div class="login-sources">
      <span>SEC EDGAR</span>
      <span>Bloomberg Terminal</span>
    </div>
  </div>
</div>

</body>
</html>
