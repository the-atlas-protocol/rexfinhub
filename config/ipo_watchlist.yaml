# Pre-IPO and recently-priced IPOs tracked for L&I filing race intelligence.
# Update valuations as fresh public reporting comes in — no code change required.
# Source: screener/li_engine/analysis/weekly_v2_report.py::IPO_DATA
# Last refresh: 2026-05-12 (FB1 stock recs audit)
#
# Schema (per entry):
#   ticker               — short label used by the report
#   company              — full company name
#   date                 — display string for IPO timing window (free text)
#   valuation            — display string for valuation (free text, includes ~ and source date)
#   desc                 — one-line description rendered in the IPO Watchlist table
#   valuation_usd        — numeric valuation in USD (float, billions). Use null if unknown / "n/a"
#   last_round_date      — ISO date of the round/tender that priced the company (YYYY-MM-DD)
#   source_url           — public URL backing the figure (Reuters / FT / Bloomberg / The Information / Forge / WSJ)
#   expected_ipo_window  — short string (e.g. "2026 H2", "TBD", "Filed S-1")
#   as_of_date           — ISO date the row was last verified (YYYY-MM-DD)

